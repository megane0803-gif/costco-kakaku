<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>コストコ価格メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ---- Header ---- */
    .header {
      background: #005dab;
      color: white;
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 17px; font-weight: 700; flex: 1; }
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 6px 4px 0;
      line-height: 1;
    }

    /* ---- Screens ---- */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ---- FAB ---- */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: #e31837;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(227,24,55,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      line-height: 1;
    }
    .fab:active { background: #c0102a; }

    /* ---- Product List ---- */
    .list-body {
      padding: 14px;
      padding-bottom: 88px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 72px 24px;
      color: #aaa;
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state p { font-size: 15px; line-height: 1.7; }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer;
    }
    .product-card:active { background: #fafafa; }

    .card-item-no { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .card-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .card-spec { font-size: 12px; color: #999; margin-bottom: 8px; }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .card-price { font-size: 22px; font-weight: 800; color: #e31837; }
    .card-unit-price { font-size: 13px; color: #555; font-weight: 500; }

    .card-meta { font-size: 11px; color: #bbb; margin-top: 6px; }

    /* ---- Form ---- */
    .form-body {
      padding: 14px;
      padding-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-section {
      background: white;
      border-radius: 12px;
      padding: 16px;
    }
    .form-section-title {
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 14px;
    }

    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .required { color: #e31837; }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      font-size: 16px;
      color: #1a1a1a;
      background: white;
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #005dab;
    }

    .row-2 { display: flex; gap: 8px; }
    .row-2 input { flex: 1; }
    .row-2 select { width: 90px; flex-shrink: 0; }

    /* Tax toggle */
    .toggle-group { display: flex; gap: 8px; }
    .toggle-btn {
      flex: 1;
      padding: 11px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      background: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #888;
      font-family: inherit;
    }
    .toggle-btn.active {
      background: #005dab;
      border-color: #005dab;
      color: white;
      font-weight: 700;
    }

    /* Store chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 20px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      color: #555;
      font-family: inherit;
    }
    .chip.active {
      background: #005dab;
      border-color: #005dab;
      color: white;
      font-weight: 600;
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #005dab;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:active { background: #004a8c; }

    .btn-danger {
      width: 100%;
      padding: 14px;
      background: white;
      color: #e31837;
      border: 1.5px solid #e31837;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
    }
    .btn-danger:active { background: #fff0f2; }
  </style>
</head>
<body>

<!-- ===== LIST SCREEN ===== -->
<div id="screen-list" class="screen active">
  <div class="header">
    <h1>コストコ 価格メモ</h1>
  </div>
  <div class="list-body">
    <div id="product-list"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="icon">🛒</div>
      <p>商品がまだありません<br>右下の + で追加してください</p>
    </div>
  </div>
  <button class="fab" onclick="openAdd()">+</button>
</div>

<!-- ===== ADD / EDIT SCREEN ===== -->
<div id="screen-add" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('list')">‹</button>
    <h1 id="form-title">商品を追加</h1>
  </div>
  <div class="form-body">

    <div class="form-section">
      <div class="form-section-title">商品情報</div>

      <div class="form-group">
        <label>Item No.</label>
        <input type="text" id="f-itemno" placeholder="例: 123456" inputmode="numeric">
      </div>

      <div class="form-group">
        <label>商品名 <span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="例: カークランド ミックスナッツ">
      </div>

      <div class="form-group">
        <label>規格</label>
        <input type="text" id="f-spec" placeholder="例: 1.13kg、5g×52包、12ロール">
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">単価計算（任意）</div>
      <div class="form-group">
        <label>数量と単位</label>
        <div class="row-2">
          <input type="number" id="f-spec-value" placeholder="1.13" inputmode="decimal" step="any">
          <select id="f-spec-unit">
            <option value="">単位</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="L">L</option>
            <option value="個">個</option>
            <option value="枚">枚</option>
            <option value="包">包</option>
            <option value="本">本</option>
            <option value="食">食</option>
            <option value="回">回</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">価格</div>

      <div class="form-group">
        <label>店頭価格 <span class="required">*</span></label>
        <input type="number" id="f-price" placeholder="1980" inputmode="numeric">
      </div>

      <div class="form-group">
        <label>税表示</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="tax-incl" onclick="setTax('included')">税込</button>
          <button class="toggle-btn active" id="tax-excl" onclick="setTax('excluded')">税抜</button>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">倉庫店</div>
      <div class="chips" id="store-chips"></div>
    </div>

    <div class="form-section">
      <div class="form-section-title">メモ（任意）</div>
      <div class="form-group">
        <textarea id="f-memo" rows="3" placeholder="クーポン使用、最安値っぽい、コストコ専用品 など" style="resize:none"></textarea>
      </div>
    </div>

    <button class="btn-primary" onclick="saveProduct()">保存する</button>
    <div id="delete-wrap" style="display:none">
      <button class="btn-danger" onclick="deleteProduct()">この商品を削除</button>
    </div>

  </div>
</div>

<script>
// ===================== CONFIG =====================
const STORES = ['幕張', '川崎', '座間', '多摩境', '新三郷', '入間', '木更津', '千葉ニュータウン'];

// ===================== STATE =====================
let currentTax = 'excluded';
let currentStore = STORES[0];
let editingId = null;

// ===================== STORAGE =====================
function getProducts() {
  return JSON.parse(localStorage.getItem('cc_products') || '[]');
}
function setProducts(data) {
  localStorage.setItem('cc_products', JSON.stringify(data));
}
function getPrices() {
  return JSON.parse(localStorage.getItem('cc_prices') || '[]');
}
function setPrices(data) {
  localStorage.setItem('cc_prices', JSON.stringify(data));
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ===================== NAVIGATION =====================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'list') {
    editingId = null;
    renderList();
  }
}

function openAdd() {
  editingId = null;
  resetForm();
  document.getElementById('form-title').textContent = '商品を追加';
  document.getElementById('delete-wrap').style.display = 'none';
  showScreen('add');
}

// ===================== LIST =====================
function renderList() {
  const products = getProducts();
  const prices = getPrices();
  const listEl = document.getElementById('product-list');
  const emptyEl = document.getElementById('empty-state');

  if (products.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  // Sort by most recently updated
  const sorted = [...products].sort((a, b) => {
    const aP = latestPrice(a.id, prices);
    const bP = latestPrice(b.id, prices);
    return (bP ? +new Date(bP.recordedAt) : 0) - (aP ? +new Date(aP.recordedAt) : 0);
  });

  listEl.innerHTML = sorted.map(p => {
    const lp = latestPrice(p.id, prices);
    const price = lp ? lp.price : null;
    const up = unitPrice(price, p.specValue, p.specUnit);
    return `
      <div class="product-card" onclick="openEdit('${p.id}')">
        ${p.itemNo ? `<div class="card-item-no">Item No. ${esc(p.itemNo)}</div>` : ''}
        <div class="card-name">${esc(p.name)}</div>
        ${p.spec ? `<div class="card-spec">${esc(p.spec)}</div>` : ''}
        <div class="card-price-row">
          <div class="card-price">${price != null ? '¥' + price.toLocaleString() : '未記録'}</div>
          ${up ? `<div class="card-unit-price">¥${fmt(up.val)}/${up.unit}</div>` : ''}
        </div>
        ${lp ? `<div class="card-meta">${esc(lp.store)} · ${fmtDate(lp.recordedAt)}</div>` : ''}
      </div>`;
  }).join('');
}

function latestPrice(productId, prices) {
  return prices
    .filter(p => p.productId === productId)
    .sort((a, b) => +new Date(b.recordedAt) - +new Date(a.recordedAt))[0] || null;
}

function unitPrice(price, val, unit) {
  if (!price || !val || !unit) return null;
  const v = parseFloat(val);
  if (!v) return null;
  return { val: price / v, unit };
}

function fmt(n) {
  return n.toLocaleString(undefined, { maximumFractionDigits: 1 });
}

function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ===================== FORM =====================
function buildStoreChips() {
  const el = document.getElementById('store-chips');
  el.innerHTML = STORES.map(s =>
    `<button class="chip${s === currentStore ? ' active' : ''}" onclick="setStore('${s}')">${s}</button>`
  ).join('');
}

function resetForm() {
  ['f-itemno', 'f-name', 'f-spec', 'f-price', 'f-memo'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-spec-value').value = '';
  document.getElementById('f-spec-unit').value = '';
  setTax('excluded');
  setStore(STORES[0]);
  buildStoreChips();
}

function setTax(type) {
  currentTax = type;
  document.getElementById('tax-incl').classList.toggle('active', type === 'included');
  document.getElementById('tax-excl').classList.toggle('active', type === 'excluded');
}

function setStore(name) {
  currentStore = name;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.textContent === name);
  });
}

function openEdit(id) {
  const products = getProducts();
  const prices = getPrices();
  const p = products.find(x => x.id === id);
  if (!p) return;

  editingId = id;
  resetForm();

  document.getElementById('f-itemno').value = p.itemNo || '';
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-spec').value = p.spec || '';
  document.getElementById('f-spec-value').value = p.specValue || '';
  document.getElementById('f-spec-unit').value = p.specUnit || '';
  document.getElementById('f-memo').value = p.memo || '';

  const lp = latestPrice(id, prices);
  if (lp) {
    document.getElementById('f-price').value = lp.price;
    setTax('included');
    setStore(lp.store || STORES[0]);
  }

  buildStoreChips();
  document.getElementById('form-title').textContent = '商品を編集';
  document.getElementById('delete-wrap').style.display = 'block';
  showScreen('add');
}

function saveProduct() {
  const name = document.getElementById('f-name').value.trim();
  const priceRaw = document.getElementById('f-price').value.trim();

  if (!name) { alert('商品名を入力してください'); return; }
  if (!priceRaw) { alert('価格を入力してください'); return; }

  let price = parseFloat(priceRaw);
  if (currentTax === 'excluded') price = Math.round(price * 1.1);

  const products = getProducts();
  const prices = getPrices();

  const productData = {
    itemNo: document.getElementById('f-itemno').value.trim(),
    name,
    spec: document.getElementById('f-spec').value.trim(),
    specValue: document.getElementById('f-spec-value').value,
    specUnit: document.getElementById('f-spec-unit').value,
    memo: document.getElementById('f-memo').value.trim(),
  };

  if (editingId) {
    const idx = products.findIndex(p => p.id === editingId);
    if (idx >= 0) products[idx] = { ...products[idx], ...productData };
  } else {
    products.push({ id: genId(), ...productData, createdAt: new Date().toISOString() });
    editingId = products[products.length - 1].id;
  }

  prices.push({
    id: genId(),
    productId: editingId,
    price,
    store: currentStore,
    recordedAt: new Date().toISOString(),
  });

  setProducts(products);
  setPrices(prices);
  showScreen('list');
}

function deleteProduct() {
  if (!editingId) return;
  if (!confirm('この商品を削除しますか？')) return;
  setProducts(getProducts().filter(p => p.id !== editingId));
  setPrices(getPrices().filter(p => p.productId !== editingId));
  showScreen('list');
}

// ===================== INIT =====================
buildStoreChips();
renderList();
</script>
</body>
</html>
